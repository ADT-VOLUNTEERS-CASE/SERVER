spring.application.name=VolunteersCase
server.port = 8080

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-only
#TODO: Create migrations to change create-only to update

spring-doc.swagger-ui.path=/docs

jwt.access-token.expiration.ms=1200000
jwt.refresh-token.expiration.sec=604800

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

storage.s3.endpoint=${S3_ENDPOINT}
storage.s3.region=${S3_REGION}
storage.s3.bucket=${S3_BUCKET}
storage.s3.access-key=${S3_ACCESS_KEY}
storage.s3.secret-key=${S3_SECRET_KEY}
storage.s3.public-base-url=${S3_PUBLIC_BASE_URL}
storage.s3.cover-prefix=${S3_COVER_PREFIX:covers}
storage.s3.path-style-access=${S3_PATH_STYLE_ACCESS:false}
